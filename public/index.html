<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Seyha Em | Portfolio</title>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        scroll-behavior: smooth;
      }
      .mobile-menu {
        transition: 0.3s ease-in-out;
      }
      .mobile-menu.closed {
        transform: translateX(100%);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <span class="text-xl font-extrabold text-indigo-600">SEYHA.DEV</span>
        <button id="menu-toggle" class="md:hidden">
          <svg
            class="w-7 h-7"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M4 6h16M4 12h16m-7 6h7"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <div class="hidden md:flex gap-8 font-semibold text-slate-600 text-sm">
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
          <a
            href="admin.html"
            class="bg-indigo-600 text-white px-5 py-2 rounded-full shadow-md"
            >Login</a
          >
        </div>
      </div>
    </nav>

    <div
      id="mobile-menu"
      class="mobile-menu closed fixed inset-0 z-40 bg-white md:hidden flex flex-col items-center justify-center gap-8 text-2xl font-bold"
    >
      <button id="menu-close" class="absolute top-6 right-6 text-3xl">
        &times;
      </button>
      <a href="#projects" class="m-link">Projects</a>
      <a href="#contact" class="m-link">Contact</a>
      <a
        href="admin.html"
        class="bg-indigo-600 text-white px-8 py-3 rounded-full"
        >Login</a
      >
    </div>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center">
      <div class="relative w-32 h-32 md:w-40 md:h-40 mx-auto mb-8">
        <div
          class="absolute inset-0 bg-indigo-600 rounded-full blur-2xl opacity-10"
        ></div>
        <img
          src="https://via.placeholder.com/150"
          alt="Seyha"
          class="relative w-full h-full object-cover rounded-full border-4 border-white shadow-xl"
        />
      </div>
      <h1 class="text-4xl md:text-7xl font-extrabold mb-6 tracking-tight">
        Full-Stack <span class="text-indigo-600">Developer</span>
      </h1>
      <p class="text-slate-500 max-w-2xl mx-auto italic px-4 leading-relaxed">
        "ជំរាបសួរ! ខ្ញុំបាទ សីហា ជាគ្រូបង្រៀនផ្នែក ICT និងជាអ្នកបង្កើតកម្មវិធី
        Web/Mobile។"
      </p>
    </header>

    <section id="projects" class="max-w-6xl mx-auto px-6 py-10">
      <h2
        class="text-2xl font-bold mb-10 border-l-4 border-indigo-600 pl-4 text-slate-800"
      >
        Featured Projects
      </h2>
      <div
        id="project-list"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
      ></div>
    </section>

    <section id="contact" class="max-w-6xl mx-auto px-6 py-20">
      <div
        class="bg-indigo-900 rounded-[2.5rem] p-8 md:p-12 text-white flex flex-col lg:flex-row gap-12 shadow-2xl relative overflow-hidden"
      >
        <div class="lg:w-1/2 z-10">
          <h2 class="text-3xl font-bold mb-6 italic">Let's Connect</h2>
          <div class="space-y-4">
            <div
              class="bg-white/5 p-4 rounded-2xl border border-white/10 flex items-center gap-4"
            >
              <span class="text-2xl">📧</span>
              <div>
                <p class="text-[10px] text-indigo-300 uppercase font-bold">
                  Email
                </p>
                <p class="font-bold text-sm">seyhaemdev@gmail.com</p>
              </div>
            </div>
            <a
              href="https://t.me/seyha_em"
              target="_blank"
              class="bg-white/10 p-4 rounded-2xl border border-white/20 flex items-center gap-4 hover:bg-white/20 transition"
            >
              <span class="text-2xl">✈️</span>
              <div>
                <p class="text-[10px] text-indigo-300 uppercase font-bold">
                  Telegram
                </p>
                <p class="font-bold text-sm">Chat with me</p>
              </div>
            </a>
          </div>
        </div>

        <div
          class="lg:w-1/2 bg-white/10 p-6 md:p-8 rounded-3xl backdrop-blur-md border border-white/20 z-10 shadow-inner"
        >
          <form id="contactForm" class="space-y-4">
            <input
              type="text"
              id="s_name"
              placeholder="Name"
              class="w-full p-4 bg-white/10 rounded-xl outline-none border border-white/20 text-sm"
              required
            />
            <input
              type="email"
              id="s_email"
              placeholder="Email Address"
              class="w-full p-4 bg-white/10 rounded-xl outline-none border border-white/20 text-sm"
              required
            />
            <textarea
              id="s_message"
              placeholder="Message"
              rows="4"
              class="w-full p-4 bg-white/10 rounded-xl outline-none border border-white/20 text-sm"
              required
            ></textarea>
            <button
              type="submit"
              id="sendBtn"
              class="w-full bg-white text-indigo-900 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition"
            >
              Send Message
            </button>
          </form>
        </div>
      </div>
    </section>

    <footer
      class="text-center py-10 text-slate-400 border-t bg-white px-4 text-xs"
    >
      <p>© 2026 Seyha Em - Node.js & Neon Postgres</p>
    </footer>

    <script>
      // Menu toggle
      const toggle = document.getElementById("menu-toggle");
      const menu = document.getElementById("mobile-menu");
      toggle.onclick = () => menu.classList.toggle("closed");
      document.getElementById("menu-close").onclick = () =>
        menu.classList.add("closed");
      document
        .querySelectorAll(".m-link")
        .forEach((l) => (l.onclick = () => menu.classList.add("closed")));

      async function fetchProjects() {
        const res = await fetch("/api/projects");
        const data = await res.json();
        document.getElementById("project-list").innerHTML = data
          .map(
            (p) => `
                <div class="bg-white border border-slate-100 rounded-3xl overflow-hidden hover:shadow-xl transition duration-500 flex flex-col h-full group">
                    <img src="${p.image_url || "https://via.placeholder.com/600x400"}" class="h-48 w-full object-cover group-hover:scale-105 transition duration-500">
                    <div class="p-6 flex flex-col flex-grow text-center md:text-left">
                        <span class="text-indigo-600 font-bold text-[10px] uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full w-fit mx-auto md:mx-0 mb-4">${p.tags || "Project"}</span>
                        <h3 class="text-lg font-bold text-slate-900 line-clamp-1">${p.title}</h3>
                        <p class="text-slate-500 text-sm mt-3 flex-grow line-clamp-3">${p.description}</p>
                        <a href="${p.link}" target="_blank" class="mt-6 font-bold text-indigo-600 text-sm inline-block">Explore Project →</a>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      document.getElementById("contactForm").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("sendBtn");
        btn.innerText = "Sending...";
        const data = {
          name: document.getElementById("s_name").value,
          email: document.getElementById("s_email").value,
          message: document.getElementById("s_message").value,
        };
        await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        alert("✅ Message Sent!");
        e.target.reset();
        btn.innerText = "Send Message";
        fetchProjects();
      };
      fetchProjects();
    </script>
  </body>
</html>
