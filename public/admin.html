<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Admin Dashboard | Seyha Em</title>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">Admin <span class="text-indigo-600">Panel</span></h1>
                <p class="text-slate-500">គ្រប់គ្រងគម្រោង និងសាររបស់អ្នក</p>
            </div>
            <a href="index.html" class="bg-white border px-5 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 transition shadow-sm">← បកទៅកាន់ Web</a>
        </div>

        <div class="grid grid-cols-1 gap-10">
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg text-sm">🚀</span> Add New Project
                </h2>
                <form id="uploadForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="title" placeholder="Project Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500" required>
                        <input type="text" id="tags" placeholder="Tags (e.g. Flutter, PHP)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    </div>
                    <textarea id="desc" placeholder="Project Description..." rows="3" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500" required></textarea>
                    <input type="url" id="img" placeholder="Image URL (Link screenshot)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    <input type="url" id="link" placeholder="Live Preview / GitHub Link" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 uppercase tracking-wider">Publish Project</button>
                </form>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="bg-amber-100 text-amber-600 p-2 rounded-lg text-sm">📂</span> Manage Projects
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b text-slate-400 text-sm uppercase tracking-wider">
                                <th class="py-4 px-2 font-semibold">Title</th>
                                <th class="py-4 px-2 font-semibold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="manage-project-list" class="text-slate-700">
                            <tr><td colspan="2" class="py-10 text-center text-slate-400 italic">កំពុងទាញយកគម្រោង...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="bg-emerald-100 text-emerald-600 p-2 rounded-lg text-sm">📩</span> Inbox (Messages)
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b text-slate-400 text-sm uppercase tracking-wider">
                                <th class="py-4 px-2 font-semibold">Sender</th>
                                <th class="py-4 px-2 font-semibold">Message</th>
                                <th class="py-4 px-2 font-semibold">Date</th>
                            </tr>
                        </thead>
                        <tbody id="message-list" class="text-slate-700">
                            <tr><td colspan="3" class="py-10 text-center text-slate-400 italic">កំពុងទាញយកសារ...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ១. មុខងារទាញយកសារមកបង្ហាញ
        async function fetchMessages() {
            try {
                const res = await fetch('/api/messages');
                const data = await res.json();
                const list = document.getElementById('message-list');
                
                if (data.length === 0) {
                    list.innerHTML = '<tr><td colspan="3" class="py-10 text-center text-slate-400">មិនទាន់មានសារនៅឡើយទេ</td></tr>';
                    return;
                }

                list.innerHTML = data.map(m => `
                    <tr class="border-b hover:bg-slate-50 transition duration-300">
                        <td class="py-4 px-2 font-bold text-indigo-600">${m.name}</td>
                        <td class="py-4 px-2 max-w-xs truncate md:max-w-md">${m.message}</td>
                        <td class="py-4 px-2 text-xs text-slate-400 whitespace-nowrap">${new Date(m.created_at).toLocaleDateString('km-KH')}</td>
                    </tr>
                `).join('');
            } catch (err) { 
                document.getElementById('message-list').innerHTML = '<tr><td colspan="3" class="py-10 text-center text-red-400">មិនអាចទាញយកទិន្នន័យបានទេ</td></tr>';
            }
        }

        // ២. មុខងារទាញយក Project មកបង្ហាញសម្រាប់លុប
        async function fetchManageProjects() {
            try {
                const res = await fetch('/api/projects');
                const data = await res.json();
                const list = document.getElementById('manage-project-list');
                
                list.innerHTML = data.map(p => `
                    <tr class="border-b hover:bg-slate-50 transition duration-300">
                        <td class="py-4 px-2 font-semibold">${p.title}</td>
                        <td class="py-4 px-2 text-right">
                            <button onclick="deleteProject(${p.id})" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition">លុប</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('manage-project-list').innerHTML = '<tr><td colspan="2" class="py-10 text-center text-red-400">Error loading projects</td></tr>';
            }
        }

        // ៣. មុខងារលុប Project
        async function deleteProject(id) {
            if (confirm("តើលោកគ្រូពិតជាចង់លុបគម្រោងនេះមែនទេ?")) {
                try {
                    const res = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        alert("✅ លុបបានជោគជ័យ!");
                        fetchManageProjects(); // Refresh list
                    }
                } catch (err) {
                    alert("❌ លុបមិនបានសម្រេច: " + err.message);
                }
            }
        }

        // ៤. មុខងារបញ្ជូន Project ថ្មី
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const projectData = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                tags: document.getElementById('tags').value,
                image_url: document.getElementById('img').value,
                link: document.getElementById('link').value
            };

            try {
                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(projectData)
                });

                if (res.ok) {
                    alert("✅ គម្រោងថ្មីត្រូវបានបង្ហោះដោយជោគជ័យ!");
                    window.location.reload();
                }
            } catch (err) {
                alert("❌ Error: " + err.message);
            } finally {
                btn.innerText = "Publish Project";
                btn.disabled = false;
            }
        };

        // ហៅមុខងារទាំងអស់ឱ្យដំណើរការ
        fetchMessages();
        fetchManageProjects();
    </script>
</body>
</html>
