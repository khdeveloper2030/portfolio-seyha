<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Admin Dashboard | Seyha Em</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-slate-100">
            <div class="w-20 h-20 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-bold">S</div>
            <h2 class="text-2xl font-bold mb-2 text-slate-900">Admin Login</h2>
            <p class="text-slate-500 mb-8 text-sm">សូមប្រើប្រាស់ Gmail របស់លោកគ្រូសីហា ដើម្បីគ្រប់គ្រងប្រព័ន្ធ</p>
            
            <div id="g_id_onload"
                 data-client_id="បញ្ចូល_CLIENT_ID_របស់លោកគ្រូ_នៅទីនេះ"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
            
            <a href="index.html" class="block mt-8 text-slate-400 text-sm hover:underline">← ត្រឡប់ទៅកាន់វេបសាយ</a>
        </div>
    </div>

    <div id="admin-content" class="hidden p-4 md:p-10 max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 italic">Admin <span class="text-indigo-600">Dashboard</span></h1>
                <p id="user-display" class="text-slate-500 text-sm mt-1"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition">Logout</button>
                <a href="index.html" class="bg-white border px-5 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 transition shadow-sm">← Back to Web</a>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-10">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 id="form-title" class="text-xl font-bold mb-6 flex items-center gap-2 text-indigo-600"><span>🚀</span> Add New Project</h2>
                <form id="uploadForm" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="title" placeholder="Project Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500" required>
                        <input type="text" id="tags" placeholder="Tags" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    </div>
                    <textarea id="desc" placeholder="Project Description..." rows="3" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500" required></textarea>
                    <input type="url" id="img" placeholder="Image URL" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    <input type="url" id="link" placeholder="Live/GitHub Link" class="w-full p-4 bg-slate-50 border rounded-2xl outline-indigo-500">
                    <div class="flex gap-2">
                        <button type="submit" id="submit-btn" class="flex-grow bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg uppercase tracking-wider">Publish Project</button>
                        <button type="button" id="cancel-btn" onclick="resetForm()" class="hidden bg-slate-200 text-slate-600 px-6 rounded-2xl font-bold">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-amber-600"><span>📂</span> Manage Projects</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left"><tbody id="manage-project-list" class="text-slate-700"></tbody></table>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-emerald-600"><span>📩</span> Inbox</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left"><tbody id="message-list" class="text-slate-700"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ១. GOOGLE OAUTH LOGIC ---
        function handleCredentialResponse(response) {
            const payload = decodeJwtResponse(response.credential);
            const allowedEmail = "seyhaemdev@gmail.com";

            if (payload.email === allowedEmail) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userName', payload.name);
                showAdmin();
            } else {
                alert("សោកស្តាយ! Gmail នេះមិនមានសិទ្ធិចូលប្រើប្រាស់ផ្នែក Admin នេះទេ។");
                location.reload();
            }
        }

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        function showAdmin() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = "Logged in as: " + sessionStorage.getItem('userName');
            fetchManageProjects();
            fetchMessages();
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        // ត្រួតពិនិត្យ Session ពេលបើកទំព័រ
        if (sessionStorage.getItem('isLoggedIn') === 'true') showAdmin();

        // --- ២. PROJECT & MESSAGE LOGIC (ដូចកូដមុនរបស់លោកគ្រូ) ---
        async function fetchMessages() {
            const res = await fetch('/api/messages');
            const data = await res.json();
            const list = document.getElementById('message-list');
            list.innerHTML = data.map(m => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="py-4 px-2 font-bold text-indigo-600 whitespace-nowrap">${m.name}</td>
                    <td class="py-4 px-2 text-sm text-slate-600">${m.message}</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="deleteMessage(${m.id})" class="text-red-400 font-bold">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteMessage(id) {
            if (confirm("លុបសារ?")) { await fetch(`/api/messages/${id}`, { method: 'DELETE' }); fetchMessages(); }
        }

        async function fetchManageProjects() {
            const res = await fetch('/api/projects');
            const data = await res.json();
            const list = document.getElementById('manage-project-list');
            list.innerHTML = data.map(p => `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="py-4 px-2 font-semibold">${p.title}</td>
                    <td class="py-4 px-2 text-right flex gap-2 justify-end">
                        <button onclick='setupEdit(${JSON.stringify(p)})' class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-600 hover:text-white transition">កែ</button>
                        <button onclick="deleteProject(${p.id})" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition">លុប</button>
                    </td>
                </tr>
            `).join('');
        }

        function setupEdit(p) {
            document.getElementById('form-title').innerText = "📝 Edit Project";
            document.getElementById('submit-btn').innerText = "Update Project";
            document.getElementById('cancel-btn').classList.remove('hidden');
            document.getElementById('edit-id').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('desc').value = p.description;
            document.getElementById('tags').value = p.tags;
            document.getElementById('img').value = p.image_url;
            document.getElementById('link').value = p.link;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('uploadForm').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "🚀 Add New Project";
            document.getElementById('submit-btn').innerText = "Publish Project";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        async function deleteProject(id) {
            if (confirm("លុបគម្រោង?")) { await fetch(`/api/projects/${id}`, { method: 'DELETE' }); fetchManageProjects(); }
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const projectData = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                tags: document.getElementById('tags').value,
                image_url: document.getElementById('img').value,
                link: document.getElementById('link').value
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/projects/${id}` : '/api/projects';
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(projectData)
            });
            if (res.ok) { resetForm(); fetchManageProjects(); alert("ជោគជ័យ!"); }
        };
    </script>
</body>
</html>
