<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cross-Origin-Opener-Policy"
      content="same-origin-allow-popups"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Admin Dashboard | Seyha Em</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen">
    <div
      id="login-overlay"
      class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4"
    >
      <div
        class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center"
      >
        <div
          class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-white text-2xl font-bold"
        >
          S
        </div>
        <h2 class="text-2xl font-bold mb-8">Admin Login</h2>

        <div
          id="g_id_onload"
          data-client_id="479851271829-ou0q6pa3kl4nvjn7d4sikg6ef2v01bhj.apps.googleusercontent.com"
          data-callback="handleCredentialResponse"
          data-ux_mode="popup"
          data-auto_prompt="false"
        ></div>

        <div
          class="g_id_signin flex justify-center"
          data-type="standard"
          data-shape="pill"
          data-theme="outline"
          data-size="large"
        ></div>

        <a
          href="index.html"
          class="block mt-8 text-slate-400 text-sm hover:underline"
          >← ត្រឡប់ទៅកាន់វេបសាយ</a
        >
      </div>
    </div>

    <div id="admin-content" class="hidden p-4 md:p-10 max-w-5xl mx-auto">
      <h1 class="text-2xl font-bold">Welcome to Admin Panel</h1>
      <button
        onclick="logout()"
        class="mt-4 bg-red-500 text-white px-4 py-2 rounded"
      >
        Logout
      </button>
    </div>

    <script>
      function handleCredentialResponse(response) {
        // បម្លែង Token ពី Google
        const payload = JSON.parse(atob(response.credential.split(".")[1]));

        if (payload.email === "seyhaemdev@gmail.com") {
          sessionStorage.setItem("isLoggedIn", "true");
          sessionStorage.setItem("userName", payload.name);
          showAdmin();
        } else {
          alert("Gmail នេះមិនមានសិទ្ធិចូលប្រើប្រាស់ទេ!");
          location.reload();
        }
      }

      function showAdmin() {
        document.getElementById("login-overlay").classList.add("hidden");
        document.getElementById("admin-content").classList.remove("hidden");
      }

      function logout() {
        sessionStorage.clear();
        location.reload();
      }

      // Check session on load
      if (sessionStorage.getItem("isLoggedIn") === "true") showAdmin();
    </script>
  </body>
</html>
